  #   cisco.dnac.path_trace_workflow_manager:
  #     <<: *catalyst_login
  #     state: deleted
  #     config:
  #       - "{{ item }}"
  #   loop: "{{ vars_map.delete_wlc }}"
  #   register: result_deleted_wlc